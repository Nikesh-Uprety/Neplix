@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.anim-in{animation:fadeIn .5s ease both}
.anim-d1{animation-delay:.1s}
.anim-d2{animation-delay:.2s}
.anim-d3{animation-delay:.3s}
.anim-d4{animation-delay:.4s}

// ── Placeholder image component ──────────────────────────────────────────
const Placeholder = ({ aspect='4/5', className='', label, color='#f0f0ee', iconColor='#bbb' }) => (
  <div className={`ph rounded-sm ${className}`} style={{aspectRatio:aspect, background:color}}>
    <svg viewBox="0 0 24 24" fill="none" stroke={iconColor} strokeWidth="1" strokeLinecap="round" strokeLinejoin="round">
      <rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
    </svg>
    {label && <span className="absolute bottom-3 left-3 text-[10px] font-medium tracking-wide uppercase opacity-30">{label}</span>}
  </div>
);

// ── Product card ─────────────────────────────────────────────────────────
const ProductCard = ({ name, price, oldPrice, badge, aspect='4/5', phColor, iconColor, nameFont='font-inter', priceStyle='' }) => (
  <div className="group cursor-pointer">
    <div className="img-zoom relative mb-3">
      <Placeholder aspect={aspect} color={phColor} iconColor={iconColor}/>
      {badge && <span className="absolute top-2 left-2 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider bg-black text-white">{badge}</span>}
    </div>
    <p className={`text-sm ${nameFont} font-medium text-gray-900 group-hover:underline underline-offset-2 transition-all`}>{name}</p>
    <div className="flex items-center gap-2 mt-0.5">
      <span className={`text-sm font-semibold text-gray-900 ${priceStyle}`}>Rs. {price.toLocaleString()}</span>
      {oldPrice && <span className="text-xs text-gray-400 line-through">Rs. {oldPrice.toLocaleString()}</span>}
    </div>
  </div>
);

// ── SVG Icons ────────────────────────────────────────────────────────────

const UserIcon = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;

const ArrowRight = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
const Instagram = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect width="20" height="20" x="2" y="2" rx="5"/><circle cx="12" cy="12" r="5"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>;

// ─────────────────────────────────────────────────────────────────────────
// STORE SWITCHER & APP
// ─────────────────────────────────────────────────────────────────────────
const STORES = [
  { id:'north',   label:'North Atelier',    desc:'Streetwear & Outerwear', component: NorthAtelier, color:'#111' },
  { id:'maison',  label:'Maison Noir',      desc:'High Fashion',          component: MaisonNoir,   color:'#1a1a1a' },
  { id:'brew',    label:'Himalayan Brew',    desc:'Coffee & Bakery',       component: HimalayanBrew,color:'#8B5E3C' },
];

const App = () => {
  const [active, setActive] = useState(()=>localStorage.getItem('np-store')||'north');
  const [switcher, setSwitcher] = useState(false);

  useEffect(()=>{
    localStorage.setItem('np-store', active);
    window.scrollTo(0,0);
  }, [active]);

  // Tweaks protocol
  useEffect(()=>{
    const handler = (e) => {
      if (e.data?.type==='__activate_edit_mode') setSwitcher(true);
      if (e.data?.type==='__deactivate_edit_mode') setSwitcher(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=>window.removeEventListener('message', handler);
  }, []);

  const Store = STORES.find(s=>s.id===active)?.component || NorthAtelier;

  return (
    <>
      {/* Floating store switcher — always visible */}
      <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[999] flex items-center gap-1.5 switcher-pill rounded-full px-1.5 py-1.5 shadow-2xl border border-white/10">
        {STORES.map(s=>(
          <button key={s.id} onClick={()=>setActive(s.id)}
            className={`px-4 py-2 rounded-full text-[11px] font-bold tracking-wide transition-all whitespace-nowrap ${active===s.id?'bg-white text-gray-900 shadow-md':'text-white/70 hover:text-white hover:bg-white/10'}`}>
            {s.label}
          </button>
        ))}
      </div>

      {/* Nepalix badge */}
      <div className="fixed top-4 right-4 z-[999] flex items-center gap-2 bg-white/90 backdrop-blur-sm rounded-full px-3 py-1.5 shadow-lg border border-gray-200/50">
        <div className="w-5 h-5 rounded-md bg-[#5B4FF9] flex items-center justify-center">
          <span className="text-white text-[8px] font-black font-sora">N</span>
        </div>
        <span className="text-[10px] font-bold text-gray-500 tracking-wide">NEPALIX STORE</span>
      </div>

      <div key={active} className="anim-in">
        <Store/>
      </div>

      {/* Tweaks panel (optional overlay) */}
      {switcher && (
        <div className="fixed bottom-20 right-5 z-[1000] bg-white rounded-2xl shadow-2xl border border-gray-200 p-5 w-56">
          <p className="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3">Tweaks</p>
          <p className="text-[11px] font-semibold text-gray-700 mb-2">Active Store</p>
          {STORES.map(s=>(
            <button key={s.id} onClick={()=>setActive(s.id)}
              className={`w-full text-left px-3 py-2 rounded-lg mb-1 text-xs font-medium transition-all ${active===s.id?'bg-[#5B4FF9] text-white':'text-gray-600 hover:bg-gray-100'}`}>
              {s.label}
              <span className="text-[10px] opacity-60 block">{s.desc}</span>
            </button>
          ))}
        </div>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
