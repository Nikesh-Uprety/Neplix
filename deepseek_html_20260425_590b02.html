// ──────────────────────────────────────────────
// CONTEXT: Cart & Wishlist (global)
// ──────────────────────────────────────────────
const ShopContext = createContext();
const ShopProvider = ({ children }) => {
  const [cart, setCart] = useState(() => {
    try { return JSON.parse(localStorage.getItem('np-cart') || '[]') } catch { return [] }
  });
  const [wishlist, setWishlist] = useState(() => {
    try { return JSON.parse(localStorage.getItem('np-wishlist') || '[]') } catch { return [] }
  });
  useEffect(() => localStorage.setItem('np-cart', JSON.stringify(cart)), [cart]);
  useEffect(() => localStorage.setItem('np-wishlist', JSON.stringify(wishlist)), [wishlist]);

  const addToCart = useCallback((product) => {
    setCart(prev => [...prev, { ...product, cartId: Date.now() }]);
  }, []);
  const toggleWishlist = useCallback((productName) => {
    setWishlist(prev => prev.includes(productName) ? prev.filter(p => p !== productName) : [...prev, productName]);
  }, []);
  return (
    <ShopContext.Provider value={{ cart, cartCount: cart.length, addToCart, wishlist, toggleWishlist }}>
      {children}
    </ShopContext.Provider>
  );
};
const useShop = () => useContext(ShopContext);

// ──────────────────────────────────────────────
// Image component with lazy load and fallback
// ──────────────────────────────────────────────
const StoreImage = ({ photoId, width, height, alt='', className='', aspectRatio, priority=false }) => {
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(false);
  const imgRef = useRef(null);
  const srcUrl = useMemo(() => {
    if (!photoId) return '';
    const w = width || 800;
    const h = height || Math.round(w * (aspectRatio ? parseFloat(aspectRatio.split('/')[1])/parseFloat(aspectRatio.split('/')[0]) : 1.25));
    return `https://images.unsplash.com/photo-${photoId}?ixlib=rb-4.0.3&auto=format&fit=crop&w=${w}&h=${h}&q=80`;
  }, [photoId, width, height, aspectRatio]);

  useEffect(() => {
    if (!srcUrl || error) return;
    if (priority) {
      const img = new Image();
      img.onload = () => setLoaded(true);
      img.onerror = () => setError(true);
      img.src = srcUrl;
      return;
    }
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && imgRef.current && !loaded && !error) {
          const img = new Image();
          img.onload = () => setLoaded(true);
          img.onerror = () => setError(true);
          img.src = srcUrl;
          observer.disconnect();
        }
      });
    }, { rootMargin: '200px' });
    if (imgRef.current) observer.observe(imgRef.current);
    return () => observer.disconnect();
  }, [srcUrl, priority]);

  const bgColor = '#e8e6e0';
  if (!srcUrl || error) {
    return (
      <div className={`relative overflow-hidden ${className}`} style={{ aspectRatio: aspectRatio || '4/5', background: bgColor }}>
        <div className="absolute inset-0 flex items-center justify-center">
          <svg width="28%" height="28%" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,.12)" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round">
            <rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
          </svg>
        </div>
      </div>
    );
  }
  return (
    <div ref={imgRef} className={`relative overflow-hidden ${className}`} style={{ aspectRatio: aspectRatio || '4/5', background: bgColor }}>
      {!loaded && <div className="absolute inset-0 animate-pulse" style={{background: bgColor}}/>}
      <img src={srcUrl} alt={alt} className={`store-image absolute inset-0 w-full h-full ${loaded ? 'loaded' : 'loading'}`} loading={priority ? 'eager' : 'lazy'} onLoad={()=>setLoaded(true)} onError={()=>setError(true)} />
    </div>
  );
};

// Parallax background section
const ParallaxSection = ({ photoId, width, height, children, className='', overlay=true }) => {

  return (

// ═══════════════════════════════════════════════
// APP with Store Switcher
// ═══════════════════════════════════════════════
const STORES = [
  { id:'north', label:'North Atelier', desc:'Streetwear & Outerwear', component: NorthAtelier, color:'#111' },
  { id:'maison', label:'Maison Noir', desc:'High Fashion', component: MaisonNoir, color:'#1a1a1a' },
  { id:'brew', label:'Himalayan Brew', desc:'Coffee & Bakery', component: HimalayanBrew, color:'#8B5E3C' },
];

const App = () => {
  const [active, setActive] = useState(() => localStorage.getItem('np-final-store') || 'north');
  const [switcher, setSwitcher] = useState(false);
  const [showScrollTop, setShowScrollTop] = useState(false);

  useEffect(() => {
    localStorage.setItem('np-final-store', active);
    window.scrollTo(0,0);
  }, [active]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setSwitcher(true);
      if (e.data?.type === '__deactivate_edit_mode') setSwitcher(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    const onScroll = () => setShowScrollTop(window.scrollY > 600);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const StoreComponent = STORES.find(s => s.id === active)?.component || NorthAtelier;

  return (
    <ShopProvider>
      <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[999] flex items-center gap-1 switcher-pill rounded-full px-1.5 py-1.5 shadow-2xl">
        {STORES.map(s => (
          <button key={s.id} onClick={()=>setActive(s.id)} className={`px-4 py-2 rounded-full text-[11px] font-bold tracking-wide transition-all whitespace-nowrap ${active===s.id ? 'bg-white text-gray-900 shadow-md' : 'text-white/70 hover:text-white hover:bg-white/10'}`}>{s.label}</button>
        ))}
      </div>

      <div className="fixed top-4 right-4 z-[999] flex items-center gap-2 bg-white/90 backdrop-blur-sm rounded-full px-3 py-1.5 shadow-lg border border-gray-200/50">
        <div className="w-5 h-5 rounded-md bg-[#5B4FF9] flex items-center justify-center"><span className="text-white text-[8px] font-black font-sora">N</span></div>
        <span className="text-[10px] font-bold text-gray-500 tracking-wide">NEPALIX STORE</span>
      </div>

      {showScrollTop && (
        <button onClick={()=>window.scrollTo({top:0, behavior:'smooth'})} className="fixed bottom-24 right-5 z-[998] w-10 h-10 bg-white rounded-full shadow-lg border border-gray-200 flex items-center justify-center hover:bg-gray-50 transition-all anim-in">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="m18 15-6-6-6 6"/></svg>
        </button>
      )}

      <div key={active} className="anim-in">
        <StoreComponent />
      </div>

      {switcher && (
        <div className="fixed bottom-20 right-5 z-[1000] bg-white rounded-2xl shadow-2xl border border-gray-200 p-5 w-56 anim-up">
          <p className="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3">Tweaks</p>
          <p className="text-[11px] font-semibold text-gray-700 mb-2">Active Store</p>
          {STORES.map(s => (
            <button key={s.id} onClick={()=>setActive(s.id)} className={`w-full text-left px-3 py-2 rounded-lg mb-1 text-xs font-medium transition-all ${active===s.id ? 'bg-[#5B4FF9] text-white' : 'text-gray-600 hover:bg-gray-100'}`}>{s.label}<span className="text-[10px] opacity-60 block">{s.desc}</span></button>
          ))}
        </div>
      )}
    </ShopProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
